<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swipely — Cross-Chain Bridge & Liquidity Monitoring</title>
    <meta
      name="description"
      content="Swipely is a monitoring platform for cross-chain asset bridges and DEX liquidity on the Stellar network — real-time health scores, reconciliation, and alerting in one dashboard."
    />
    <meta name="theme-color" content="#0057FF" />
    <meta property="og:title" content="Swipely — Cross-Chain Bridge & Liquidity Monitoring" />
    <meta
      property="og:description"
      content="Real-time health scores, reconciliation, and alerting for cross-chain asset bridges and DEX liquidity on the Stellar network."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <script>
      (function () {
        try {
          var key = "swipely:theme:v1";
          var stored = localStorage.getItem(key);
          var mode = stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved = mode === "system" ? (prefersDark ? "dark" : "light") : mode;

          var root = document.documentElement;
          if (resolved === "dark") root.classList.add("dark");
          else root.classList.remove("dark");

          root.setAttribute("data-theme", resolved);
          root.setAttribute("data-theme-mode", mode);
        } catch (e) {
          document.documentElement.classList.add("dark");
          document.documentElement.setAttribute("data-theme", "dark");
          document.documentElement.setAttribute("data-theme-mode", "system");
        }
      })();
    </script>
  </head>
  <body class="bg-stellar-dark text-stellar-text-primary">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
